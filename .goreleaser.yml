version: 2

builds:
  - binary: qs
    ldflags:
      - -X github.com/mattiasthalen/qlik-sync/cmd.Version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  filters:
    exclude:
      - "^chore"
      - "^docs"
      - "^test"
